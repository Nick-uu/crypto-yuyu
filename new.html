<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crypto 鱼鱼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9}
header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px}
header h1{font-size:16px;font-weight:600}
header h1 span{color:#d2a8ff}
#status{font-size:12px;color:#8b949e;padding:8px 16px}
.controls{display:flex;gap:8px;padding:8px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap}
.controls select{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:4px 8px;font-size:12px;outline:none}
.controls button{background:#238636;border:none;border-radius:6px;color:#fff;padding:4px 12px;font-size:12px;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
th{padding:6px 8px;text-align:right;font-weight:600;color:#8b949e;border-bottom:1px solid #30363d}
th:first-child{text-align:center;width:30px}
td{padding:4px 8px;text-align:right;border-bottom:1px solid #1c2128}
td:nth-child(2){text-align:left;font-weight:600}
.text-up{color:#3fb950}.text-down{color:#f85149}
.loading{text-align:center;color:#484f58;padding:40px;font-size:14px}
</style>
</head>
<body>
<header><h1>Crypto <span>鱼鱼</span></h1></header>
<div id="status">正在连接数据源...</div>
<div class="controls">
<select id="sort">
<option value="volume_desc">成交额 ↓</option>
<option value="volume_asc">成交额 ↑</option>
<option value="gainers">涨幅榜</option>
<option value="losers">跌幅榜</option>
</select>
<select id="count">
<option value="20">20</option>
<option value="50" selected>50</option>
<option value="100">100</option>
</select>
<button id="refresh">刷新</button>
</div>
<table>
<thead><tr><th>#</th><th>币种</th><th>价格</th><th>24h涨跌</th><th>24h成交额</th><th>市值排名</th></tr></thead>
<tbody id="tbody">
<tr><td class="loading" colspan="6">正在获取数据...</td></tr>
</tbody>
</table>
<script>
var $=function(id){return document.getElementById(id)};

function fmtP(v){if(v==null)return'--';var n=+v;if(n<0.00001)return'$'+n.toFixed(8);if(n<0.001)return'$'+n.toFixed(6);if(n<1)return'$'+n.toFixed(4);if(n<50)return'$'+n.toFixed(2);return'$'+n.toLocaleString(undefined,{maxFractionDigits:2})};
function fmtC(v){return(v>=0?'+':'')+v.toFixed(2)+'%'};
function fmtV(v){if(!v)return'$0';var n=+v;if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';return'$'+(n/1e3).toFixed(0)+'K'};

function loadData(){
  var tb=$('tbody');
  tb.innerHTML='<tr><td class="loading" colspan="6">正在获取数据...</td></tr>';
  $('status').textContent='正在请求 CoinGecko API...';
  
  fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=100&page=1&sparkline=false',{signal:(function(){var c=new AbortController();setTimeout(function(){c.abort()},10000);return c.signal})()})
    .then(function(r){return r.json()})
    .then(function(d){
      if(!Array.isArray(d))throw new Error('数据格式错误');
      var sort=$('sort').value;
      $('status').textContent='已连接 CoinGecko · '+d.length+' 个币种';
      
      if(sort==='volume_desc')d.sort(function(a,b){return(b.total_volume||0)-(a.total_volume||0)});
      else if(sort==='volume_asc')d.sort(function(a,b){return(a.total_volume||0)-(b.total_volume||0)});
      else if(sort==='gainers')d.sort(function(a,b){return(b.price_change_percentage_24h||0)-(a.price_change_percentage_24h||0)});
      else if(sort==='losers')d.sort(function(a,b){return(a.price_change_percentage_24h||0)-(b.price_change_percentage_24h||0)});
      
      var limit=parseInt($('count').value)||50;
      d=d.slice(0,limit);
      
      var h='';
      for(var i=0;i<d.length;i++){
        var c=d[i];
        var ch=c.price_change_percentage_24h||0;
        h+='<tr><td>'+(i+1)+'</td><td>'+c.symbol.toUpperCase()+'</td><td>'+fmtP(c.current_price)+'</td><td class="'+(ch>=0?'text-up':'text-down')+'">'+fmtC(ch)+'</td><td>'+fmtV(c.total_volume)+'</td><td>#'+(c.market_cap_rank||'-')+'</td></tr>';
      }
      tb.innerHTML=h;
    })
    .catch(function(e){
      tb.innerHTML='<tr><td class="loading" colspan="6">获取失败: '+e.message+'<br><button onclick="loadData()" style="margin-top:8px;background:#238636;border:none;border-radius:6px;color:#fff;padding:4px 12px;cursor:pointer">重试</button></td></tr>';
      $('status').textContent='连接失败';
    });
}

$('sort').addEventListener('change',loadData);
$('count').addEventListener('change',loadData);
$('refresh').addEventListener('click',loadData);

loadData();
</script>
</body>
</html>
