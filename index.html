<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}

.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600}

@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}

.toast{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:7px 12px;font-size:12px;max-width:280px;box-shadow:0 6px 16px rgba(0,0,0,.4);animation:fadeIn .2s}
.toast.buy{border-color:#3fb950}.toast.sell{border-color:#f85149}.toast.pred{border-color:#d2a8ff}
footer{padding:8px 20px;font-size:10px;color:#484f58;border-top:1px solid #21262d;text-align:center}
</style></head><body>

🔄 正在连接数据源...<br>

<div class="toast-container" id="toastContainer"></div>
<footer>Crypto YUYU鱼鱼 🔮 · 多数据源自动切换 · 无需翻墙</footer>

<script>
// ====== State ======
const S={
  ws:null,connected:false,paused:false,mode:'init',dataSource:'',manualSource:'auto',
  symbols:{},snapshots:[],klines:{},klineFetching:new Set(),
  alerts:[],lastAlertKeys:{},watchlist:[],
  currentTab:'predict',alertTimer:null,klineTimer:null,restTimer:null,
  reconnectTimer:null,connTimeout:null,started:false
};
const $=id=>document.getElementById(id);
const fmtP=v=>{if(v==null)return'--';const n=+v;if(n<0.00001)return'$'+n.toFixed(8);if(n<0.001)return'$'+n.toFixed(6);if(n<1)return'$'+n.toFixed(4);if(n<50)return'$'+n.toFixed(2);return'$'+n.toLocaleString(undefined,{maxFractionDigits:2,minFractionDigits:2})};
const fmtV=v=>{if(!v)return'$0';const n=+v;if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0)};
const fmtC=v=>(v>=0?'+':'')+v.toFixed(2)+'%';
const fmtA=v=>{if(v==null)return'--';return(v>=0?'+':'')+(v*100).toFixed(1)+'%/s'};

function loadWatch(){try{const d=JSON.parse(localStorage.getItem('predWatch'));if(Array.isArray(d))S.watchlist=d}catch(e){}}
function saveWatch(){localStorage.setItem('predWatch',JSON.stringify(S.watchlist))}
function loadSource(){try{const d=localStorage.getItem('predSource');if(d&&d!=='auto'){S.manualSource=d;$('dataSource').value=d}}catch(e){}}
function saveSource(){localStorage.setItem('predSource',S.manualSource)}

// ====== Connection Manager (Multi-source) ======
const DOMAINS = {
  ws: ['stream.binance.com:9443','stream.binance.io:9443'],
  rest: ['api.binance.com','www.binance.com','api.binance.io','api1.binance.com','api2.binance.com','api3.binance.com'],
  mexc: ['api.mexc.com'],
  huobi: ['api.huobi.pro'],
};

function status(dot,txt){$('statusDot').className='dot '+dot;$('statusText').textContent=txt}
function setMode(label,cls){const t=$('modeTag');t.textContent=label;t.className='mode-tag '+cls;t.style.display=''}

async function connect(){
  S.started=true;
  if(S.ws){try{S.ws.close()}catch(e){}S.ws=null}
  if(S.restTimer){clearInterval(S.restTimer);S.restTimer=null}
  if(S.connTimeout){clearTimeout(S.connTimeout);S.connTimeout=null}
  if(S.reconnectTimer){clearTimeout(S.reconnectTimer)}
  status('busy','连接中...');
  $('reconnectBtn').style.display='none';
  $('loadingMsg').style.display='';$('mainTable').style.display='none';

  // Phase 0: Local proxy (fast - connect fail in ~200ms if not running)
  try{
    const r=await fetch("http://127.0.0.1:3456/api/v3/ticker/24hr",{signal:(c=>{setTimeout(()=>c.abort(),2000);return c.signal})(new AbortController())});
    if(r.ok){const d=await r.json();if(Array.isArray(d)&&d.length>0){
      processBinance(d);initConnected("proxy","🚀 本地代理","mode-rest");
      if(S.restTimer)clearInterval(S.restTimer);
      S.restTimer=setInterval(async()=>{if(!S.paused)try{const r2=await fetch("http://127.0.0.1:3456/api/v3/ticker/24hr",{signal:(c=>{setTimeout(()=>c.abort(),5000);return c.signal})(new AbortController())});if(r2.ok)processBinance(await r2.json())}catch(e){}},5000);
      return
    }}
  }catch(e){}

  
  // Manual source selection
  const ms=S.manualSource;
  if(ms!=='auto'){
    if(ms==='ws'){
      for(let i=0;i<DOMAINS.ws.length;i++){
        const url='wss://'+DOMAINS.ws[i]+'/ws/!miniTicker@arr';
        const ok=await tryWS(url);
        if(ok){initConnected('ws','⚡ Binance WS','mode-ws');return}
      }
    }else if(ms==='rest'){
      for(let i=0;i<DOMAINS.rest.length;i++){
        const url='https://'+DOMAINS.rest[i]+'/api/v3/ticker/24hr';
        const data=await tryREST(url);
        if(data&&startREST(url)){initConnected('rest','📡 Binance REST','mode-rest');return}
      }
    }else if(ms==='cg'){if(await tryCoinGecko()){initConnected('cg','🦎 CoinGecko','mode-cg');return}
    }else if(ms==='mexc'){if(await tryMEXC()){initConnected('mexc','🟢 MEXC','mode-cg');return}
    }else if(ms==='huobi'){if(await tryHuobi()){initConnected('huobi','🟡 Huobi','mode-cg');return}
    }else if(ms==='okx'){if(await tryOKX()){initConnected('okx','🟢 OKX','mode-cg');return}}
    status('off','❌ 所选源不可用');
    setMode('连接失败','mode-err');
    $('reconnectBtn').style.display='';
    $('loadingMsg').innerHTML='⚠️ '+$('dataSource').options[$('dataSource').selectedIndex].text+' 连不上，试试其他源';
    return;
  }
// Phase 1: WebSocket (takes ~5s per attempt)
  for(let i=0;i<DOMAINS.ws.length;i++){
    const url='wss://'+DOMAINS.ws[i]+'/ws/!miniTicker@arr';
    const ok=await tryWS(url);
    if(ok){initConnected('ws','⚡ WebSocket 实时','mode-ws');return}
  }

  // Phase 2: Binance REST
  for(let i=0;i<DOMAINS.rest.length;i++){
    const url='https://'+DOMAINS.rest[i]+'/api/v3/ticker/24hr';
    status('busy','尝试 REST...('+(i+1)+'/'+DOMAINS.rest.length+')');
    const data=await tryREST(url);
    if(data&&startREST(url)){initConnected('rest','📡 Binance REST','mode-rest');return}
  }

  // Phase 3: CoinGecko
  status('busy','连接 CoinGecko...');
  if(await tryCoinGecko()){initConnected('cg','🦎 CoinGecko','mode-cg');return}

  // Phase 4: OKX
  status('busy','连接 OKX...');
  if(await tryOKX()){initConnected('okx','🟢 OKX','mode-cg');return}
  
  // Phase 5: MEXC (Chinese exchange, usually accessible)
  status('busy','连接 MEXC...');
  if(await tryMEXC()){initConnected('mexc','🟢 MEXC','mode-cg');return}
  
  // Phase 6: Huobi/HTX
  status('busy','连接 Huobi...');
  if(await tryHuobi()){initConnected('huobi','🟡 Huobi','mode-cg');return}

  // All failed
  status('off','❌ 所有数据源连不上');
  setMode('连接失败','mode-err');
  $('reconnectBtn').style.display='';
  $('loadingMsg').innerHTML='⚠️ 全部失败 · 解决: ① 终端运行 run-proxy.sh ② 换 DNS 1.1.1.1 ③ 用 Chrome 打开 ④ VPN';
}

function initConnected(mode,label,cls){
  S.connected=true;S.dataSource=mode;
  status('on','已连接');setMode(label,cls);
  $('reconnectBtn').style.display='none';
  $('loadingMsg').style.display='none';$('mainTable').style.display='';
  stopTimers();startTimers();
  setTimeout(()=>updateKlines(),3000);
}

// ---- WebSocket ----
function tryWS(url){
  return new Promise(resolve=>{
    try{
      const ws=new WebSocket(url);
      const to=setTimeout(()=>{try{ws.close()}catch(e){}resolve(false)},6000);
      ws.onopen=()=>{clearTimeout(to);S.ws=ws;resolve(true)};
      ws.onmessage=e=>{try{const d=JSON.parse(e.data);if(Array.isArray(d))processBinance(d)}catch(ex){}};
      ws.onclose=()=>{if(S.connected){reconnect()}};
      ws.onerror=()=>{clearTimeout(to);resolve(false)};
    }catch(e){resolve(false)}
  });
}

function reconnect(){
  S.connected=false;S.mode='init';
  stopTimers();
  S.reconnectTimer=setTimeout(connect,5000);
}

// ---- REST ----
async function tryREST(url){
  try{
    const r=await fetch(url,{signal:(c=>{setTimeout(()=>c.abort(),5000);return c.signal})(new AbortController())});
    if(!r.ok)return null;
    const d=await r.json();
    if(Array.isArray(d)&&d.length>0)return d;
    return null;
  }catch(e){return null}
}

function startREST(url){
  tryREST(url).then(d=>{if(d){processBinance(d);S.connected=true}});
  if(S.restTimer)clearInterval(S.restTimer);
  S.restTimer=setInterval(()=>{if(!S.paused)tryREST(url).then(d=>{if(d)processBinance(d)})},5000);
  return true;
}

// ---- CoinGecko ----
async function tryCoinGecko(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=150&page=1&sparkline=false',{signal:(c=>{setTimeout(()=>c.abort(),8000);return c.signal})(new AbortController())});
    if(!r.ok)return false;
    const d=await r.json();
    if(!Array.isArray(d)||d.length<5)return false;
    processCoinGecko(d);
    S.restTimer=setInterval(async()=>{
      if(S.paused)return;
      try{const r2=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=150&page=1&sparkline=false',{signal:(c=>{setTimeout(()=>c.abort(),8000);return c.signal})(new AbortController())});if(r2.ok)processCoinGecko(await r2.json())}catch(e){}
    },60000); // CoinGecko free API: ~30 calls/min, 60s is safe
    return true;
  }catch(e){return false}
}

function processCoinGecko(data){
  const now=Date.now();let count=0;
  const entries=[];
  for(const c of data){
    const sym=(c.symbol||'').toUpperCase()+'USDT';
    const price=c.current_price||0;
    const change=c.price_change_percentage_24h||0;
    const qVol=c.total_volume||0;
    const vol=c.total_volume/(price||1)||0;
    if(!price||!qVol)continue;
    count++;
    if(!S.symbols[sym])S.symbols[sym]={price,change,vol,quoteVol:qVol,prevVol:0,velocity:0,surge:0,surgePct:0,volChange:0,priceTrend:0,buyScore:0,sellScore:0,signal:'neutral',predictScore:0};
    const s=S.symbols[sym];
    const pVol=s.vol||0;
    s.price=price;s.change=change;s.vol=vol;s.quoteVol=qVol;
    const dVol=vol-pVol;
    if(dVol>0)s.velocity=(s.velocity||0)*0.5+dVol*0.5;
    entries.push({sym,s});
  }
  $('coinCount').textContent=count+' 币';
  takeSnapshot(now);
  calcScores();
  render();
}

// ---- OKX ----
async function tryOKX(){
  try{
    const r=await fetch('https://www.okx.com/api/v5/market/tickers?instType=SPOT',{signal:(c=>{setTimeout(()=>c.abort(),8000);return c.signal})(new AbortController())});
    if(!r.ok)return false;
    const j=await r.json();
    if(!j.data||!Array.isArray(j.data)||j.data.length<5)return false;
    processOKX(j.data);
    S.restTimer=setInterval(async()=>{
      if(S.paused)return;
      try{const r2=await fetch('https://www.okx.com/api/v5/market/tickers?instType=SPOT',{signal:(c=>{setTimeout(()=>c.abort(),8000);return c.signal})(new AbortController())});if(r2.ok){const j2=await r2.json();if(j2.data)processOKX(j2.data)}}catch(e){}
    },5000);
    return true;
  }catch(e){return false}
}

function processOKX(data){
  const now=Date.now();let count=0;
  for(const t of data){
    const sym=t.instId.replace('-','');
    if(!sym.endsWith('USDT'))continue;
    const price=+t.last||0;
    const open=+t.open24h||0;
    const change=open>0?((price-open)/open)*100:0;
    const qVol=+t.volCcy24h||0;
    const vol=+t.vol24h||0;
    if(!price)continue;
    count++;
    if(!S.symbols[sym])S.symbols[sym]={price,change,vol,quoteVol:qVol,prevVol:0,velocity:0,surge:0,surgePct:0,volChange:0,priceTrend:0,buyScore:0,sellScore:0,signal:'neutral',predictScore:0};
    const s=S.symbols[sym];
    const pVol=s.vol||0;

// ---- Common processing ----
function takeSnapshot(now){
  const snap={time:now,data:{}};
  for(const[sym,s]of Object.entries(S.symbols))snap.data[sym]={vol:s.quoteVol,price:s.price};
  S.snapshots.push(snap);
  const cut=now-65000;
  while(S.snapshots.length&&S.snapshots[0].time<cut)S.snapshots.shift();
}

function calcScores(){
  if(S.snapshots.length<2)return;
  const r=S.snapshots[S.snapshots.length-1],o=S.snapshots[0];
  const el=(r.time-o.time)/1000;if(el<1)return;
  for(const[sym,s]of Object.entries(S.symbols)){
    const rd=r.data[sym],od=o.data[sym];
    if(!rd||!od)continue;
    const dV=rd.vol-od.vol,dP=rd.price-od.price;
    s.volChange=dV;s.priceTrend=dP>0?1:dP<0?-1:0;
    if(el>0&&od.vol>0){s.surge=dV/el;s.surgePct=(dV/od.vol)*100}else{s.surge=0;s.surgePct=0}
    const vf=Math.max(0,Math.min(s.surgePct/10,20)),cf=s.change>0?Math.min(s.change*1.5,30):s.change<0?Math.min(Math.abs(s.change)*1.5,30):0,sf=Math.max(0,Math.min((Math.log10(Math.max(s.quoteVol,1))-4)*3,15)),pf=s.price<5?10:s.price<10?5:0;
    if(s.surgePct>0.5&&s.priceTrend>0){s.buyScore=vf+cf+sf+pf;s.signal='buy'}else{s.buyScore=0}
    if(s.surgePct>0.5&&s.priceTrend<0&&s.change<3){s.sellScore=vf+Math.abs(cf)+sf+pf;s.signal='sell'}else{s.sellScore=0}
    if(!s.buyScore&&!s.sellScore)s.signal='neutral';else if(s.buyScore>=s.sellScore&&s.buyScore>0)s.signal='buy';else if(s.sellScore>s.buyScore)s.signal='sell';
  }
}

// ---- Kline (uses available API) ----
async function fetchKlines(sym){
  for(const base of DOMAINS.rest){
    try{
      const url='https://'+base+'/api/v3/klines?symbol='+sym+'&interval=5m&limit=30';
      const r=await fetch(url,{signal:(c=>{setTimeout(()=>c.abort(),5000);return c.signal})(new AbortController())});
      if(!r.ok)continue;
      const d=await r.json();
      return d.map(k=>({time:k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    }catch(e){continue}
  }
  return null;
}

function calcMA(d,p){if(!d||d.length<p)return null;return d.slice(-p).reduce((a,b)=>a+b.close,0)/p}
function calcRSI(d,p){p=p||14;if(!d||d.length<p+1)return 50;const c=d.map(x=>x.close);let g=0,l=0;for(let i=c.length-p;i<c.length;i++){const d2=c[i]-c[i-1];if(d2>0)g+=d2;else l-=d2}if(l===0)return 100;return 100-100/(1+g/l)}

function calcScore(data){
  if(!data||data.length<15)return 0;
  const c=data[data.length-1].close;
  const m5=calcMA(data,5),m10=calcMA(data,10),m20=calcMA(data,20),rsi=calcRSI(data,14);
  const v5=data.slice(-5).reduce((a,b)=>a+b.volume,0)/5,v10=data.slice(-10,-5).reduce((a,b)=>a+b.volume,0)/5,vr=v10>0?v5/v10:1;
  let sc=0;
  if(m5!==null&&m10!==null&&m5>m10)sc+=15;
  if(m10!==null&&m20!==null&&m10>m20)sc+=10;
  if(m5!==null&&c>m5*1.001)sc+=8;
  if(m20!==null&&c>m20*1.002)sc+=7;
  if(vr>1.8)sc+=15;else if(vr>1.3)sc+=10;else if(vr>1.1)sc+=5;
  if(rsi<30)sc+=20;else if(rsi<40)sc+=15;else if(rsi<50)sc+=10;else if(rsi<60)sc+=5;else if(rsi>75)sc-=15;else if(rsi>70)sc-=8;
  const m5m=data.length>=6?(c-data[data.length-6].close)/c*100:0;
  if(m5m>3)sc+=15;else if(m5m>1.5)sc+=10;else if(m5m>0)sc+=5;else if(m5m<-2)sc-=5;
  if(v5>0){const vr2=data[data.length-1].volume/v5;if(vr2>3)sc+=10;else if(vr2>2)sc+=6;else if(vr2>1.5)sc+=3}
  const p10=data.slice(-10);const rh=Math.max(...p10.map(d=>d.high)),rl=Math.min(...p10.map(d=>d.low));
  const pir=rh-rl>0?(c-rl)/(rh-rl):0.5;
  if(pir<0.2&&vr>1.5)sc+=10;
  return Math.max(0,Math.min(100,Math.round(sc)));
}

async function updateKlines(){
  if(!S.connected||S.paused)return;
  const entries=Object.entries(S.symbols).filter(([sym,s])=>s.quoteVol>=50000).sort((a,b)=>(b[1].buyScore||0)+(b[1].predictScore||0)-(a[1].buyScore||0)-(a[1].predictScore||0));
  const top=entries.slice(0,10);
  await Promise.allSettled(top.map(([sym])=>{
    if(S.klineFetching.has(sym))return;
    S.klineFetching.add(sym);
    return fetchKlines(sym).then(d=>{if(d){S.klines[sym]=d;if(S.symbols[sym])S.symbols[sym].predictScore=calcScore(d)}}).finally(()=>S.klineFetching.delete(sym));
  }));
  $('klineCount').textContent=Object.keys(S.klines).length;
  render();
}

function spark(sym){
  const d=S.klines[sym];if(!d||d.length<2)return'';
  const w=76,h=26,p=d.map(x=>x.close),mn=Math.min(...p),mx=Math.max(...p),rg=mx-mn||1;
  const up=p[p.length-1]>=p[0];
  const pts=p.map((v,i)=>(i/(p.length-1))*w+','+(h-((v-mn)/rg)*(h-4)-2)).join(' ');
  const vols=d.map(x=>x.volume),mv=Math.max(...vols)||1;
  let bars='';
  for(let i=0;i<vols.length;i++){const bw=Math.max(0.5,w/vols.length-0.3),bh=(vols[i]/mv)*7;bars+='<rect x="'+((i/vols.length)*w-bw/2)+'" y="'+(h-bh)+'" width="'+bw+'" height="'+bh+'" fill="'+(up?'#3fb95022':'#f8514922')+'"/>'}
  const gid='g'+sym.replace(/[^a-z0-9]/gi,'');
  return '<svg width="80" height="28" viewBox="0 0 '+w+' '+h+'"><defs><linearGradient id="'+gid+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+(up?'#3fb95044':'#f8514944')+'"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>'+bars+'<polyline points="'+pts+'" fill="none" stroke="'+(up?'#3fb950':'#f85149')+'" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><polygon points="'+pts+' '+w+','+h+' 0,'+h+'" fill="url(#'+gid+')"/></svg>';
}

function getRanking(mode){
  const l=parseInt($('displayCount').value)||50,mv=parseFloat($('minVolFilter').value)||0,pc=parseFloat($('priceCap').value)||99999,mp=parseFloat($('minPredScore').value)||0;
  let e=Object.entries(S.symbols).filter(([sym,s])=>s.quoteVol>=mv&&s.price<=pc);
  if(mode==='buy'){e=e.filter(([sym,s])=>s.buyScore>0);e.sort((a,b)=>(b[1].buyScore||0)-(a[1].buyScore||0))}
  else if(mode==='sell'){e=e.filter(([sym,s])=>s.sellScore>0);e.sort((a,b)=>(b[1].sellScore||0)-(a[1].sellScore||0))}
  else{e=e.filter(([sym,s])=>(s.predictScore||0)>=mp);e.sort((a,b)=>{const d=(b[1].predictScore||0)-(a[1].predictScore||0);return Math.abs(d)<5?(b[1].buyScore||0)-(a[1].buyScore||0):d})}
  return e.slice(0,l);
}
