<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}

</div>

<script>
// ====== State ======
const S = {
  ws: null, connected: false, paused: false, mode: 'init',
  symbols: {}, snapshots: [], klines: {}, klineFetching: new Set(),
  alerts: [], lastAlertKeys: {},
  watchlist: [], currentTab: 'predict',
  alertTimer: null, klineTimer: null, restTimer: null,
  reconnectTimer: null, connTimeout: null,
  started: false, wsAttempts: 0,
};
const $ = id => document.getElementById(id);

// ====== Connection URLs (auto fallback) ======
// WebSocket order: try stream.binance.com first, then .io
const WS_URLS = [
  'wss://stream.binance.com:9443/ws/!miniTicker@arr',
  'wss://stream.binance.io:9443/ws/!miniTicker@arr',
];
// REST API endpoints (for fallback polling)
const REST_URLS = [
  'https://api.binance.com/api/v3/ticker/24hr',
  'https://api.binance.io/api/v3/ticker/24hr',
  'https://api1.binance.com/api/v3/ticker/24hr',
  'https://api2.binance.com/api/v3/ticker/24hr',
  'https://api3.binance.com/api/v3/ticker/24hr',
];

// ====== Storage ======
function loadWatch(){try{const d=JSON.parse(localStorage.getItem('predWatch'));if(Array.isArray(d))S.watchlist=d}catch(e){}}
function saveWatch(){localStorage.setItem('predWatch',JSON.stringify(S.watchlist))}

// ====== Format ======
const fmtP = v => {if(v==null)return'--';const n=parseFloat(v);if(n<0.00001)return'$'+n.toFixed(8);if(n<0.001)return'$'+n.toFixed(6);if(n<1)return'$'+n.toFixed(4);if(n<50)return'$'+n.toFixed(2);return'$'+n.toLocaleString(undefined,{maxFractionDigits:2,minFractionDigits:2})};
const fmtV = v => {if(!v)return'$0';const n=parseFloat(v);if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0)};
const fmtC = v => (v>=0?'+':'')+v.toFixed(2)+'%';
const fmtA = v => {if(v==null)return'--';return(v>=0?'+':'')+(v*100).toFixed(1)+'%/s'};

// ====== Connection Manager ======
function connect(){
  if(S.ws){try{S.ws.close()}catch(e){}S.ws=null}
  if(S.restTimer){clearInterval(S.restTimer);S.restTimer=null}
  if(S.connTimeout){clearTimeout(S.connTimeout);S.connTimeout=null}
  S.started=true; S.wsAttempts=0;
  updateStatus('busy','正在连接...');
  $('reconnectBtn').style.display='none';
  setMode('ws');
  tryWS(0);
}

function tryWS(idx){
  if(idx >= WS_URLS.length){
    // All WebSocket failed → fall back to REST
    fallbackREST(0);
    return;
  }
  const url = WS_URLS[idx];
  try {
    S.ws = new WebSocket(url);
  } catch(e) {
    tryWS(idx+1);
    return;
  }
  // 8 second timeout per WS attempt
  S.connTimeout = setTimeout(() => {
    if(!S.connected){
      if(S.ws){try{S.ws.close()}catch(e){}}
      tryWS(idx+1);
    }
  }, 8000);

  S.ws.onopen = () => {
    S.connected=true; S.wsAttempts=0;
    if(S.connTimeout){clearTimeout(S.connTimeout);S.connTimeout=null}
    updateStatus('on','已连接');
    setMode('ws');
    $('reconnectBtn').style.display='none';
    $('loadingMsg').style.display='none';
    $('mainTable').style.display='';
    stopTimers();
    startTimers();
    setTimeout(()=>updateKlines(),3000);
  };

  S.ws.onmessage = (e) => {
    if(S.paused) return;
    try {
      const data = JSON.parse(e.data);
      if(Array.isArray(data)) processTickerData(data);
    } catch(err) {}
  };

  S.ws.onclose = () => {
    if(S.connected){
      S.connected=false;
      updateStatus('off','已断开，尝试重连...');
      stopTimers();
      if(S.reconnectTimer) clearTimeout(S.reconnectTimer);
      S.reconnectTimer = setTimeout(()=>connect(),5000);
    }
  };

  S.ws.onerror = () => { if(!S.connected) tryWS(idx+1); };
}

async function fallbackREST(idx){
  if(idx >= REST_URLS.length){
    updateStatus('off','❌ 所有接口都连不上');
    setMode('err');
    $('reconnectBtn').style.display='';
    $('loadingMsg').innerHTML = '⚠️ 无法连接币安服务器<br>请检查网络，或点击"重试连接"';
    return;
  }
  const url = REST_URLS[idx];
  updateStatus('busy','重试中...('+(idx+1)+'/'+REST_URLS.length+')');
  try {
    const resp = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if(resp.ok){
      const data = await resp.json();
      if(Array.isArray(data) && data.length > 0){
        S.connected=true;
        updateStatus('on','REST轮询');
        setMode('rest');
        $('loadingMsg').style.display='none';
        $('mainTable').style.display='';
        // Process initial batch
        processTickerData(data);
        // Start polling every 5 seconds
        S.restTimer = setInterval(async () => {
          if(S.paused) return;
          try {
            const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
            if(r.ok) processTickerData(await r.json());
          } catch(e) {}
        }, 5000);
        startTimers();
        setTimeout(()=>updateKlines(),3000);
        return;
      }
    }
    fallbackREST(idx+1);
  } catch(e) {
    fallbackREST(idx+1);
  }
}

function setMode(m){
  S.mode = m;
  const tag = $('modeTag');
  if(m === 'ws'){ tag.textContent='⚡ WebSocket 实时'; tag.className='mode-tag mode-ws'; tag.style.display=''; }
  else if(m === 'rest'){ tag.textContent='📡 REST 轮询'; tag.className='mode-tag mode-rest'; tag.style.display=''; }
  else { tag.style.display='none'; }
}

function updateStatus(dot, text){
  $('statusDot').className = 'dot ' + dot;
  $('statusText').textContent = text;
}

// ====== Data Processing ======
function processTickerData(arr){
  if(!Array.isArray(arr)) return;
  const now = Date.now();
  let count = 0;
  for(const t of arr){
    const sym = t.s;
    if(!sym || !sym.endsWith('USDT')) continue;
    const price = parseFloat(t.c) || 0;
    const open = parseFloat(t.o) || 0;
    const change = open > 0 ? ((price - open) / open) * 100 : 0;
    const qVol = parseFloat(t.q) || 0;
    const vol = parseFloat(t.v) || 0;
    count++;
    if(!S.symbols[sym]) S.symbols[sym] = {price, change, vol, quoteVol: qVol, prevVol: 0, velocity: 0, surge: 0, surgePct: 0, volChange: 0, priceTrend: 0, buyScore: 0, sellScore: 0, signal: 'neutral', predictScore: 0};
    const s = S.symbols[sym];
    const pVol = s.vol || 0;
    s.price = price; s.change = change; s.vol = vol; s.quoteVol = qVol;
    const dVol = vol - pVol;
    if(dVol > 0) s.velocity = (s.velocity || 0) * 0.5 + dVol * 0.5;
  }
  $('coinCount').textContent = count + ' 交易对';
  takeSnapshot(now);
  calcScores();
  render();
}

// ====== Snapshots & Scores ======
function takeSnapshot(now){
  const snap = {time: now, data: {}};
  for(const [sym, s] of Object.entries(S.symbols)) snap.data[sym] = {vol: s.quoteVol, price: s.price};
  S.snapshots.push(snap);
  const cut = now - 65000;
  while(S.snapshots.length && S.snapshots[0].time < cut) S.snapshots.shift();
}

function calcScores(){
  if(S.snapshots.length < 2) return;
  const r = S.snapshots[S.snapshots.length-1], o = S.snapshots[0];
  const el = (r.time - o.time) / 1000; if(el < 1) return;
  for(const [sym, s] of Object.entries(S.symbols)){
    const rd = r.data[sym], od = o.data[sym];
    if(!rd || !od) continue;
    const dVol = rd.vol - od.vol, dP = rd.price - od.price;
    s.volChange = dVol; s.priceTrend = dP > 0 ? 1 : dP < 0 ? -1 : 0;
    if(el > 0 && od.vol > 0){ s.surge = dVol / el; s.surgePct = (dVol / od.vol) * 100; }
    else { s.surge = 0; s.surgePct = 0; }
    const vf = Math.max(0, Math.min(s.surgePct/10, 20));
    const cf = s.change > 0 ? Math.min(s.change*1.5, 30) : s.change < 0 ? Math.min(Math.abs(s.change)*1.5, 30) : 0;
    const sf = Math.max(0, Math.min((Math.log10(Math.max(s.quoteVol,1))-4)*3, 15));
    const pf = s.price < 5 ? 10 : s.price < 10 ? 5 : 0;
    if(s.surgePct > 0.5 && s.priceTrend > 0){ s.buyScore = vf+cf+sf+pf; s.signal = 'buy'; } else { s.buyScore = 0; }
    if(s.surgePct > 0.5 && s.priceTrend < 0 && s.change < 3){ s.sellScore = vf+Math.abs(cf)+sf+pf; s.signal = 'sell'; } else { s.sellScore = 0; }
    if(!s.buyScore && !s.sellScore) s.signal = 'neutral';
    else if(s.buyScore >= s.sellScore && s.buyScore > 0) s.signal = 'buy';
    else if(s.sellScore > s.buyScore) s.signal = 'sell';
  }
}

// ====== Kline & Indicators ======
async function fetchKlines(sym, interval, limit){
  interval = interval || '5m'; limit = limit || 30;
  for(const base of ['https://api.binance.com','https://api.binance.io','https://api1.binance.com']){
    try {
      const url = base + '/api/v3/klines?symbol=' + sym + '&interval=' + interval + '&limit=' + limit;
      const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const d = await r.json();
      return d.map(k => ({time: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]), low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5])}));
    } catch(e) { continue; }
  }
  return null;
}

function calcMA(data, p){ if(!data||data.length<p)return null; return data.slice(-p).reduce((a,b)=>a+b.close,0)/p; }
function calcRSI(data, p){ p=p||14; if(!data||data.length<p+1)return 50; const c=data.map(d=>d.close); let g=0,l=0; for(let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d} if(l===0)return 100; return 100-100/(1+g/l); }

function calcPredictScore(data){
  if(!data||data.length<15)return 0;
  const close=data[data.length-1].close;
  const m5=calcMA(data,5),m10=calcMA(data,10),m20=calcMA(data,20),rsi=calcRSI(data,14);
  const v5=data.slice(-5).reduce((a,b)=>a+b.volume,0)/5;
  const v10=data.slice(-10,-5).reduce((a,b)=>a+b.volume,0)/5;
  const vr=v10>0?v5/v10:1;
  let sc=0;
  if(m5!==null&&m10!==null&&m5>m10)sc+=15;
  if(m10!==null&&m20!==null&&m10>m20)sc+=10;
  if(m5!==null&&close>m5*1.001)sc+=8;
  if(m20!==null&&close>m20*1.002)sc+=7;
  if(vr>1.8)sc+=15; else if(vr>1.3)sc+=10; else if(vr>1.1)sc+=5;
  if(rsi<30)sc+=20; else if(rsi<40)sc+=15; else if(rsi<50)sc+=10; else if(rsi<60)sc+=5; else if(rsi>75)sc-=15; else if(rsi>70)sc-=8;
  const m5m=data.length>=6?(close-data[data.length-6].close)/close*100:0;
  if(m5m>3)sc+=15; else if(m5m>1.5)sc+=10; else if(m5m>0)sc+=5; else if(m5m<-2)sc-=5;
  if(v5>0){const vr2=data[data.length-1].volume/v5;if(vr2>3)sc+=10;else if(vr2>2)sc+=6;else if(vr2>1.5)sc+=3;}
  const p10=data.slice(-10); const rh=Math.max(...p10.map(d=>d.high)), rl=Math.min(...p10.map(d=>d.low));
  const pir=rh-rl>0?(close-rl)/(rh-rl):0.5;
  if(pir<0.2&&vr>1.5)sc+=10;
  return Math.max(0,Math.min(100,Math.round(sc)));
}

async function updateKlines(){
  if(!S.connected||S.paused)return;
  const entries=Object.entries(S.symbols)
    .filter(([sym,s])=>s.quoteVol>=50000)
    .sort((a,b)=>(b[1].buyScore||0)+(b[1].predictScore||0)-(a[1].buyScore||0)-(a[1].predictScore||0));
  const top=entries.slice(0,12);
  await Promise.allSettled(top.map(([sym])=>{
    if(S.klineFetching.has(sym))return Promise.resolve(null);
    S.klineFetching.add(sym);
    return fetchKlines(sym).then(data=>{if(data){S.klines[sym]=data;if(S.symbols[sym])S.symbols[sym].predictScore=calcPredictScore(data)}}).finally(()=>S.klineFetching.delete(sym));
  }));
  $('klineCount').textContent=Object.keys(S.klines).length;
  render();
}

function sparklineSVG(sym){
  const d=S.klines[sym]; if(!d||d.length<2)return'';
  const w=76,h=26,p=d.map(x=>x.close),mn=Math.min(...p),mx=Math.max(...p),rg=mx-mn||1;
  const up=p[p.length-1]>=p[0];
  const pts=p.map((v,i)=>(i/(p.length-1))*w+','+(h-((v-mn)/rg)*(h-4)-2)).join(' ');
  const vols=d.map(x=>x.volume); const mv=Math.max(...vols)||1;
  let bars='';
  for(let i=0;i<vols.length;i++){const bw=Math.max(0.5,w/vols.length-0.3),bh=(vols[i]/mv)*7;bars+='<rect x="'+((i/vols.length)*w-bw/2)+'" y="'+(h-bh)+'" width="'+bw+'" height="'+bh+'" fill="'+(up?'#3fb95022':'#f8514922')+'"/>';}
  const gid='g'+sym.replace(/[^a-z0-9]/gi,'');
  return '<svg width="80" height="28" viewBox="0 0 '+w+' '+h+'"><defs><linearGradient id="'+gid+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+(up?'#3fb95044':'#f8514944')+'"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>'+bars+'<polyline points="'+pts+'" fill="none" stroke="'+(up?'#3fb950':'#f85149')+'" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><polygon points="'+pts+' '+w+','+h+' 0,'+h+'" fill="url(#'+gid+')"/></svg>';
}

// ====== Ranking ======
function getRanking(mode){
  const limit=parseInt($('displayCount').value)||50,minVol=parseFloat($('minVolFilter').value)||0,priceCap=parseFloat($('priceCap').value)||99999,minPred=parseFloat($('minPredScore').value)||0;
  let e=Object.entries(S.symbols).filter(([sym,s])=>s.quoteVol>=minVol&&s.price<=priceCap);
  if(mode==='buy'){e=e.filter(([sym,s])=>s.buyScore>0);e.sort((a,b)=>(b[1].buyScore||0)-(a[1].buyScore||0))}
  else if(mode==='sell'){e=e.filter(([sym,s])=>s.sellScore>0);e.sort((a,b)=>(b[1].sellScore||0)-(a[1].sellScore||0))}
  else{e=e.filter(([sym,s])=>(s.predictScore||0)>=minPred);e.sort((a,b)=>{const d=(b[1].predictScore||0)-(a[1].predictScore||0);return Math.abs(d)<5?(b[1].buyScore||0)-(a[1].buyScore||0):d})}
  return e.slice(0,limit);
}

// ====== Render ======
function render(){
  const tab=S.currentTab;
  if(tab==='watchlist'){renderWatchlist();updateBadges();return}
  const r=getRanking(tab); updateBadges();
  if(!r.length){$('tableBody').innerHTML='<tr><td colspan="10" style="text-align:center;color:#484f58;padding:30px">等待数据...</td></tr>';return}
  const tb=$('tableBody'); const ms=r.length>0?Math.max(Math.abs(r[0][1].surge||1),1):1;
  let h='';
  for(let i=0;i<r.length;i++){
    const[sym,s]=r[i],base=sym.replace('USDT',''),sc=s.predictScore||0;
    const pc=sc>=70?'predict-high':sc>=50?'sig-buy':'',iw=S.watchlist.some(w=>w.sym===sym);
    const rc=i<3?'rank-top3':i<10?'rank-top10':'',bp=Math.min(Math.abs(s.surge)/ms*100,60);
    let tags='';
    if(sc>=70)tags='<span class="tag tag-predict">★ 强烈看涨</span>';
    else if(sc>=50)tags='<span class="tag tag-predict">看涨</span>';
    else if(s.signal==='buy')tags='<span class="tag tag-buy">做多</span>';
    else if(s.signal==='sell')tags='<span class="tag tag-sell">卖出</span>';
    else tags='<span class="tag tag-neutral">-</span>';
    let tech='<span class="text-muted" style="font-size:10px">--</span>';
    const kd=S.klines[sym];
    if(kd&&kd.length>=15&&Object.keys(S.klines).length>0){const m5=calcMA(kd,5),m10=calcMA(kd,10),m20=calcMA(kd,20),rsi=calcRSI(kd,14);const f1=m5&&m10?(m5>m10?'🟢':'🔴'):'',f2=m10&&m20?(m10>m20?'🟢':'🔴'):'',f3=rsi<40?'🟢':rsi>70?'🔴':'⚪';tech='<span style="font-size:10px">'+f1+f2+f3+' '+(rsi?rsi.toFixed(0):'--')+'</span>';}
    const pc2=sc>=70?'#d2a8ff':sc>=50?'#58a6ff':sc>=30?'#d29922':'#484f58';
    h+='<tr class="'+pc+(iw?' watched':'')+'"><td class="'+rc+'">'+(i+1)+'</td><td><a class="sym-link" data-sym="'+sym+'" style="cursor:pointer">'+base+'</a></td><td style="padding:0 4px;text-align:center;line-height:0">'+sparklineSVG(sym)+'</td><td>'+fmtP(s.price)+'</td><td>'+tags+'</td><td class="'+(s.change>=0?'text-up':'text-down')+'">'+fmtC(s.change)+'</td><td><div class="pred-bar" style="width:'+bp+'px;background:'+(s.signal==='buy'?'#3fb95055':s.signal==='sell'?'#f8514955':'#58a6ff33')+';vertical-align:middle;display:inline-block;margin-right:2px"></div><span class="'+(s.surge>0?'text-up':'')+'">'+fmtA(s.surgePct/60)+'</span></td><td>'+fmtV(s.quoteVol)+'</td><td>'+tech+'</td><td><div class="pred-bar" style="width:'+(sc*0.35)+'px;background:linear-gradient(90deg,#484f58,'+pc2+');margin-right:4px"></div><strong style="color:'+pc2+'">'+(sc||0)+'</strong></td></tr>';
  }
  tb.innerHTML=h;
  if(r.length>0){const[sym,s]=r[0];$('topMover').innerHTML='🔮 首: <strong>'+sym.replace('USDT','')+'</strong> 预测分'+(s.predictScore||0)+' '+fmtC(s.change)+' 加速'+fmtA(s.surgePct/60)}
}

function updateBadges(){
  $('buyBadge').textContent=getRanking('buy').length;
  $('sellBadge').textContent=getRanking('sell').length;
  const pc=Object.entries(S.symbols).filter(([sym,s])=>(s.predictScore||0)>=(parseFloat($('minPredScore').value)||0)).length;
  $('predBadge').textContent=pc;
  $('sigCount').textContent=getRanking('buy').length+getRanking('sell').length;
}

function renderWatchlist(){
  const bd=$('watchlistBody');$('watchBadge').textContent=S.watchlist.length;
  if(!S.watchlist.length){bd.innerHTML='<tr><td colspan="10"><div style="color:#484f58;text-align:center;padding:30px">自选为空</div></td></tr>';return}
  let h='';
  for(let i=0;i<S.watchlist.length;i++){
    const w=S.watchlist[i],s=S.symbols[w.sym],base=w.sym.replace('USDT',''),avg=w.avgPrice||0;
    let pnl=0,pnlPct=0;if(s&&avg>0){pnl=s.price-avg;pnlPct=((s.price-avg)/avg)*100}
    const sc=s?(s.predictScore||0):0,pc=sc>=70?'#d2a8ff':sc>=50?'#58a6ff':sc>=30?'#d29922':'#484f58';
    h+='<tr class="'+(sc>=50?'sig-buy':'')+'"><td>'+(i+1)+'</td><td class="text-highlight">'+base+'</td><td style="padding:0 4px;text-align:center;line-height:0">'+sparklineSVG(w.sym)+'</td><td>'+(s?fmtP(s.price):'--')+'</td><td>'+(s&&s.signal==='buy'?'<span class="tag tag-buy">做多</span>':s&&s.signal==='sell'?'<span class="tag tag-sell">卖出</span>':'<span class="tag tag-neutral">-</span>')+'</td><td class="'+(s&&s.change>=0?'text-up':'text-down')+'">'+(s?fmtC(s.change):'--')+'</td><td>'+fmtP(avg)+'</td><td class="'+(pnlPct>0?'text-up':'text-down')+'">'+(avg>0?fmtC(pnlPct):'--')+'</td><td><strong style="color:'+pc+'">'+sc+'</strong></td><td><button class="gray" style="font-size:10px;padding:1px 6px" onclick="removeWatch(\''+w.sym+'\')">✕</button></td></tr>';
    if(avg>0)h+='<tr style="border-top:none"><td colspan="2"></td><td colspan="8" style="font-size:10px;color:#484f58;padding:0 8px 4px">止盈 ~'+fmtP(avg*1.03)+' | 止损 ~'+fmtP(avg*0.97)+' | 当前 '+(s?fmtP(s.price):'--')+'</td></tr>';
  }
  bd.innerHTML=h;
}

function addWatch(sym){if(S.watchlist.some(w=>w.sym===sym))return;const s=S.symbols[sym];S.watchlist.push({sym,avgPrice:s?s.price:0});saveWatch();render();if(S.currentTab==='watchlist')renderWatchlist();}
function removeWatch(sym){S.watchlist=S.watchlist.filter(w=>w.sym!==sym);saveWatch();if(S.currentTab==='watchlist')renderWatchlist();render();}

// ====== Alerts ======
function checkAlerts(){
  const e=Object.entries(S.symbols).filter(([sym,s])=>s.quoteVol>=100000).sort((a,b)=>((b[1].predictScore||0)*2+(b[1].buyScore||0))-((a[1].predictScore||0)*2+(a[1].buyScore||0)));
  const n=Date.now();
  for(const[sym,s]of e.slice(0,6)){
    const base=sym.replace('USDT',''),sc=s.predictScore||0,iw=S.watchlist.some(w=>w.sym===sym);
    if(sc>=70&&s.surgePct>2&&s.change>1){const k=sym+'_p';if(!S.lastAlertKeys[k]||n-S.lastAlertKeys[k]>180000){S.lastAlertKeys[k]=n;addAL('pred',base,'预测分'+sc+'!'+fmtC(s.change));if(iw)showToast('pred','🔮 '+base+'强烈看涨!'+sc)}}
    if(s.signal==='sell'&&s.surgePct>3&&iw){const k=sym+'_s';if(!S.lastAlertKeys[k]||n-S.lastAlertKeys[k]>120000){S.lastAlertKeys[k]=n;addAL('sell',base,'卖出加速'+fmtC(s.change));showToast('sell','🔴 '+base+'卖出信号!')}}
  }
}
function addAL(type,l,m){const n=Date.now();S.alerts.unshift({type,label:l,msg:m,time:n});if(S.alerts.length>100)S.alerts.pop();const bd=$('alertsBody'),ph=bd.querySelector('[style*="text-align:center"]');if(ph)ph.remove();const dv=document.createElement('div');dv.className='alert-line';const t=new Date(n);const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');dv.innerHTML='<span class="alert-time">'+ts+'</span><span class="alert-label '+type+'">'+l+'</span><span>'+m+'</span>';bd.prepend(dv);$('alertCount').textContent=S.alerts.length;}
function showToast(type,m){const d=document.createElement('div');d.className='toast '+type;d.textContent=m;$('toastContainer').appendChild(d);setTimeout(()=>d.remove(),5000)}

// ====== Timers ======
function startTimers(){stopTimers();S.alertTimer=setInterval(checkAlerts,6000);S.klineTimer=setInterval(updateKlines,30000)}
function stopTimers(){if(S.alertTimer){clearInterval(S.alertTimer);S.alertTimer=null}if(S.klineTimer){clearInterval(S.klineTimer);S.klineTimer=null}}

// ====== Bindings ======
document.querySelectorAll('.tab-btn').forEach(el=>{el.addEventListener('click',function(){const t=this.dataset.tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');if(t==='watchlist'){$('tableWrap').style.display='none';$('watchlistPanel').style.display='';S.currentTab='watchlist';renderWatchlist()}else{$('tableWrap').style.display='';$('watchlistPanel').style.display='none';S.currentTab=t;render()}})});
document.addEventListener('click',e=>{const l=e.target.closest('.sym-link');if(!l)return;e.preventDefault();addWatch(l.dataset.sym)});
$('reconnectBtn').addEventListener('click',connect);
$('pauseBtn').addEventListener('click',function(){S.paused=!S.paused;this.textContent=S.paused?'▶ 继续':'⏸ 暂停'});
$('clearBtn').addEventListener('click',function(){S.alerts=[];S.lastAlertKeys={};$('alertsBody').innerHTML='<div style="color:#484f58;text-align:center;padding:6px">已清除</div>';$('alertCount').textContent='0'});
['minVolFilter','priceCap','minPredScore','displayCount'].forEach(id=>{$(id).addEventListener('change',function(){if(S.connected)render()})});

// ====== Init ======
loadWatch();
connect();
</script>
